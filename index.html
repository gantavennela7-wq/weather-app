<!DOCTYPE html>
<html>
<head>
<title>Weather App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="theme-toggle"><span>☀️</span><label class="switch"><input type="checkbox" id="modeToggle"><span class="slider"></span></label><span>🌙</span></div>
<h1>Weather App 🌤️</h1>
<div class="search">
<input id="city" type="text" placeholder="Enter city name">
<button onclick="getWeather()">Search</button>
</div>
<div class="weather-card">
<h2 id="cityName">City</h2>
<img id="icon" src="">
<h1 id="temp">--°C</h1>
<p id="condition">Condition</p>
<div class="details">
<div>
<h3 id="humidity">--%</h3>
<p>Humidity</p>
</div>
<div>
<h3 id="feels">--°C</h3>
<p>Feels Like</p>
</div>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
